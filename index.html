<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảo trì website</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
}

/* Desktop */
.banner {
  width: 100%;
  height: 100vh;
  background-image: url('./banner.jpg');
  background-size: cover; /* 🔥 full màn hình */
  background-position: center;
  background-repeat: no-repeat;
}

/* Mobile */
@media (max-width: 768px) {
  .banner {
    background-image: url('./banner_m.jpg');
    background-size: contain; /* 📱 không bị cắt nội dung */
    background-color: #fff; /* tránh nền xấu */
  }
}
</style>
</head>

<body>

<div class="banner"></div>

</body>
</html>
