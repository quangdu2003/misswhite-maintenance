<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mỹ phẩm MissWhite đang bảo trì</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #fff;
}

/* Khung chứa banner */
.banner-container {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Ảnh */
.banner-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Mobile chỉnh lại cho không bị cắt */
@media (max-width: 768px) {
  .banner-img {
    object-fit: contain;
    height: auto;
  }
}
</style>
</head>

<body>

<div class="banner-container">

  <picture>
    <!-- 📱 Mobile -->
    <source srcset="banner_m.jpg" media="(max-width: 768px)">
    
    <!-- 💻 Desktop -->
    <img src="banner.jpg" alt="Banner bảo trì website" class="banner-img">
  </picture>

</div>

</body>
</html>
