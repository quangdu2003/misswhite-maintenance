<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mỹ phẩm MissWhite đang bảo trì</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* Container full màn hình */
.banner-container {
  width: 100%;
  height: 100vh;
}

/* Ảnh full màn hình */
.banner-img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 🔥 FULL màn hình, không viền */
}

/* Mobile */
@media (max-width: 768px) {
  body {
    height: 100%;
    overflow: auto;
  }

  .banner-container {
    height: auto;
  }

  .banner-img {
    width: 100%;
    height: auto;
    object-fit: contain; /* 📱 mobile không bị cắt nội dung */
  }
}
</style>
</head>

<body>

<div class="banner-container">
  <picture>
    <source srcset="./banner_m.jpg" media="(max-width: 768px)">
    <img src="./banner.jpg" class="banner-img" alt="Banner bảo trì">
  </picture>
</div>

</body>
</html>
